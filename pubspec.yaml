name: fronter_log
description: A personal fronter-tracking and system-management app for plural systems, backed by an Obsidian vault.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  file_picker: ^10.0.0
  image_picker: ^1.1.2
  image_cropper: ^12.2.1
  flutter_local_notifications: ^21.0.0
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  path_provider: ^2.1.3
  path: ^1.9.0
  csv: ^6.0.0
  intl: ^0.20.3
  uuid: ^4.4.0
  fl_chart: ^1.2.0
  shared_preferences: ^2.2.3
  permission_handler: ^12.0.3
  audioplayers: ^6.6.0
  timezone: ^0.11.0
  url_launcher: ^6.3.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/glow_textures/
    - assets/frame_shapes/